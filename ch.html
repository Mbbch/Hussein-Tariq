<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منصة الأستاذة زهراء الشمري | Hussein Tariq</title>
    <style>
        :root {
            --medical-blue: #1e3a8a;
            --digital-teal: #14b8a6;
            --premium-gold: #fbbf24;
            --bg-neutral: #f1f5f9;
        }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-neutral); overflow: hidden;
        }
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2563eb, #1e3a8a);
            display: flex; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.5s;
        }
        .login-card {
            background: white; padding: 40px 30px; border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3); width: 85%; max-width: 380px; text-align: center;
        }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e5e7eb; border-radius: 12px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 15px; background: var(--medical-blue); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #main-app { display: none; flex-direction: column; height: 100vh; }
        header { background: var(--medical-blue); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--premium-gold); }
        .viewer { flex: 1; position: relative; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        footer { background: #111827; color: white; padding: 15px; text-align: center; font-size: 0.7rem; }
        .copyright { color: var(--premium-gold); font-weight: bold; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <div style="font-size: 60px;">🧪</div>
        <h2>مختبر الكيمياء الذكي</h2>
        <p>بإشراف الأستاذة زهراء سعد الشمري</p>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="attemptLogin()">دخول آمن للمنصة</button>
        <p style="font-size: 0.7rem; margin-top: 20px;">تصميم وتطوير: حسين طارق | جامعة نينوى 2026</p>
    </div>
</div>

<div id="main-app">
    <header>
        <h1>الأستاذة زهراء سعد الشمري</h1>
        <p>المنصة التفاعلية لكيمياء السادس العلمي 2026</p>
    </header>
    <div style="padding:10px; background:white;">
        <select onchange="updateSim(this.value)" style="width:100%; padding:14px; border-radius:10px; border:2px solid var(--digital-teal); font-family: inherit;">
            <option value="">-- اختر التجربة المنهجية المعتمدة --</option>
            <optgroup label="الفصل الأول: الثرموداينمك">
                <option value="https://phet.colorado.edu/sims/html/energy-forms-and-changes/latest/energy-forms-and-changes_ar.html">أشكال الطاقة (الحرارة النوعية)</option>
                <option value="https://phet.colorado.edu/sims/html/energy-forms-and-changes/latest/energy-forms-and-changes_ar.html?screens=2">تغيرات الطاقة (الأنثالبي)</option>
            </optgroup>
            <optgroup label="الفصل الثاني: الاتزان">
                <option value="https://phet.colorado.edu/sims/html/reversible-reactions/latest/reversible-reactions_ar.html">التفاعلات الانعكاسية ولوشاتليه</option>
            </optgroup>
            <optgroup label="الفصل الثالث: الاتزان الأيوني">
                <option value="https://phet.colorado.edu/sims/html/ph-scale/latest/ph-scale_ar.html">مقياس الأس الهيدروجيني pH</option>
            </optgroup>
            <optgroup label="الفصل الرابع: الكهربائية">
                <option value="https://phet.colorado.edu/sims/html/battery-voltage/latest/battery-voltage_ar.html">جهد الخلية والبطاريات</option>
            </optgroup>
        </select>
    </div>
    <div class="viewer">
        <iframe id="phet-iframe" src="about:blank"></iframe>
    </div>
    <footer>
        <div>جميع الحقوق محفوظة للمنهج العراقي | © 2026</div>
        <span class="copyright">صمم بواسطة المبدع حسين طارق</span>
    </footer>
</div>

<script>
    const userDb = { "hussein": "2026", "zahraa": "chem2026" };
    function attemptLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if (userDb[u] && userDb[u] === p) {
            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                updateSim("https://phet.colorado.edu/sims/html/energy-forms-and-changes/latest/energy-forms-and-changes_ar.html");
            }, 500);
        } else { alert("بيانات الدخول غير صحيحة!"); }
    }
    function updateSim(url) { if(url) document.getElementById('phet-iframe').src = url; }
</script>
</body>
</html>
